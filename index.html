<!DOCTYPE html>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./images/favicon.ico" type="image/x-icon">
    <title>Easy Tailwind</title>

        <div class="size-[30px]">
            <img src="./images/tailwind-logo.png" class="w-full h-full" alt="">

    </header>

            <div class="size-[250px] scale-150 rounded-full bg-[#730096] blur-3xl absolute hidden"></div>
            <h2
                class="absolute top-8 text-5xl capitalize font-bold text-[#0bcae4] text-center typewriter ease-linear">
                Convert
                Css <br /> <span class="text-3xl mt-1">to Tailwind</span>
            </h2>

                <div

                    158 property</div>
                <div
                    class="text-wrap flex justify-center items-center capitalize p-4 size-[70px] text-sm translate-x-[-50%] rounded-lg shadow-[0_0_10px_5px_inset_#7e03c579] bg-gradient-to-r from-[#663398] to-[#73009680] text-center">
                    hight preformance</div>
            </div> -->
            <div class="absolute z-20 w-[280px] fade md:w-[450px]">
                <form action="" id="search-form" method="post" class="relative">
                    <input name="search" id="search" type="text"
                        class="bg-transparent text-white text-pretty outline-none cursor-text py-2 w-full"
                        placeholder="search...">
                    <div class=" bg-white h-[1px] w-full animate-[line_2.5s_normal] ease-linear"></div>
                    <button type="submit"
                        class="absolute rounded-2xl top-3 p-1 bg-[#0bcae4] right-0 animate-bounce active:scale-90">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="#fff" class="size-4">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                        </svg>
                    </button>
                    <label class="block pt-2 text-end capitalize text-[#fff] fade-down delay-300" for="search">type css
                        declaration</label>
                </form>
            </div>
        </div>
    </section>

    <section id="content-sec" class="w-full h-fit p-4">
        <div class="w-fit m-auto text-center">
            <h2 class="text-3xl fade-up">
                Tailwind Classes
            </h2>
            <div class="p-1 hidden scale-x-150 border-b-[1px] animate-[line_1s_forwards] border-[#0bcae4]"></div>
        </div>
        <div id="content-container" class="flex justify-evenly gap-x-4 gap-y-10 flex-wrap p-4 mt-8">
        </div>

        <div class="flex items-center justify-center px-4 py-6 sm:px-6">
            <div class="flex flex-1 items-center justify-center">

                <div>
                    <nav aria-label="Pagination" class="isolate inline-flex -space-x-px rounded-md">
                        <button id="prev"
                            class="relative inline-flex items-center rounded-l-md px-2 py-2 text-gray-400 inset-ring inset-ring-gray-700 hover:bg-white/5 focus:z-20 focus:outline-offset-0">
                            <span class="sr-only">Previous</span>
                            <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true"
                                class="size-5">
                                <path
                                    d="M11.78 5.22a.75.75 0 0 1 0 1.06L8.06 10l3.72 3.72a.75.75 0 1 1-1.06 1.06l-4.25-4.25a.75.75 0 0 1 0-1.06l4.25-4.25a.75.75 0 0 1 1.06 0Z"
                                    clip-rule="evenodd" fill-rule="evenodd" />
                            </svg>
                        </button>
                        <!-- Current: "z-10 text-white focus-visible:outline-2 focus-visible:outline-offset-2 bg-indigo-500 focus-visible:outline-indigo-500", Default: "inset-ring focus:outline-offset-0 text-gray-200 inset-ring-gray-700 hover:bg-white/5" -->
                        <button aria-current="page"
                            class="relative z-10 inline-flex items-center bg-indigo-500 px-4 py-2 text-sm font-semibold text-white focus:z-20 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500">1</button>
                        <button
                            class="relative inline-flex items-center px-4 py-2 text-sm font-semibold text-gray-200 inset-ring inset-ring-gray-700 hover:bg-white/5 focus:z-20 focus:outline-offset-0">2</button>
                        <button
                            class="relative hidden items-center px-4 py-2 text-sm font-semibold text-gray-200 inset-ring inset-ring-gray-700 hover:bg-white/5 focus:z-20 focus:outline-offset-0 md:inline-flex">3</button>
                        <span
                            class="relative inline-flex items-center px-4 py-2 text-sm font-semibold text-gray-400 inset-ring inset-ring-gray-700 focus:outline-offset-0">...</span>
                        <button
                            class="relative hidden items-center px-4 py-2 text-sm font-semibold text-gray-200 inset-ring inset-ring-gray-700 hover:bg-white/5 focus:z-20 focus:outline-offset-0 md:inline-flex">8</button>
                        <button
                            class="relative inline-flex items-center px-4 py-2 text-sm font-semibold text-gray-200 inset-ring inset-ring-gray-700 hover:bg-white/5 focus:z-20 focus:outline-offset-0">9</button>
                        <button
                            class="relative inline-flex items-center px-4 py-2 text-sm font-semibold text-gray-200 inset-ring inset-ring-gray-700 hover:bg-white/5 focus:z-20 focus:outline-offset-0">10</button>
                        <button id="next"
                            class="relative inline-flex items-center rounded-r-md px-2 py-2 text-gray-400 inset-ring inset-ring-gray-700 hover:bg-white/5 focus:z-20 focus:outline-offset-0">
                            <span class="sr-only">Next</span>
                            <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true"
                                class="size-5">
                                <path
                                    d="M8.22 5.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L11.94 10 8.22 6.28a.75.75 0 0 1 0-1.06Z"
                                    clip-rule="evenodd" fill-rule="evenodd" />
                            </svg>
                        </button>
                    </nav>
                </div>
            </div>
        </div>
    </section>

    <script src="./js/main.js"></script>
    <script src="./js/script.js"></script>
</body>

</html>
