<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./images/favicon.ico" type="image/x-icon">
    <title>Easy Tailwind</title>
    <link rel="stylesheet" href="./css/global.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen min-w-screen text-white bg-gradient-to-r from-[#1e1e1e] via-[#001a3d] to-[#1e1e1e] bg-cover">
    <header class="p-4 w-full flex gap-4 items-center">
        <div class="size-[30px]">
            <img src="./images/tailwind-logo.png" class="w-full h-full" alt="">
        </div>
        <h1 class="text-2xl font-semibold">Easy Tailwind</h1>
    </header>

    <section class="w-full h-[70vh] flex justify-center items-center">
        <div class="container size-full flex justify-center items-center relative">
            <div class="size-[250px] scale-150 rounded-full bg-[#730096] blur-3xl absolute"></div>
            <h2 class="absolute top-4 text-2xl capitalize font-semibold text-[#0cdab8] fade-up">Convert Css to Tailwind</h2>
            <div class="relative size-full z-10 hidden md:block">
                <div
                    class="p-4 absolute top-4 left-[25%] translate-x-[-50%] rounded-full shadow-[0_0_10px_5px_#7e03c579] bg-gradient-to-r from-[#663398] to-[#73009680] text-center animate-[up-down_5s_infinite] ease-in-out transition-all">
                    Css</div>
                <div
                    class="p-4 absolute top-3 right-[15%] translate-x-[-50%] rounded-full shadow-[0_0_10px_5px_#7e03c579] bg-gradient-to-r from-[#663398] to-[#73009680] text-center animate-[up-down_5s_infinite] ease-in-out transition-all">
                    Css</div>
                <div
                    class="p-4 absolute top-[55%] left-[10%] translate-x-[-50%] rounded-full shadow-[0_0_10px_5px_#7e03c579] bg-gradient-to-r from-[#663398] to-[#73009680] text-center animate-[up-down_5s_infinite] ease-in-out transition-all">
                    Css</div>
                <div
                    class="p-4 absolute bottom-0 left-1/2 translate-x-[-50%] rounded-full shadow-[0_0_10px_5px_#7e03c579] bg-gradient-to-r from-[#663398] to-[#73009680] text-center animate-[up-down_5s_infinite] ease-in-out transition-all">
                    Css</div>
                <div
                    class="p-4 absolute bottom-12 right-[10%] translate-x-[-50%] rounded-full shadow-[0_0_10px_5px_#7e03c579] bg-gradient-to-r from-[#663398] to-[#73009680] text-center animate-[up-down_5s_infinite] ease-in-out transition-all">
                    Css</div>
            </div>
            <div class="absolute z-20 w-[280px] fade md:w-[450px]">
                <form action="" method="post" class="relative">
                    <input name="search" id="search" type="text"
                        class="bg-transparent text-white fill-white outline-none cursor-text py-2 border-b border-[#0cdab8] w-full"
                        placeholder="search...">
                    <button type="submit" class="absolute rounded-2xl top-3 p-1 bg-[#0cdab8] right-0"><svg
                            xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="#880cee" class="size-4">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                        </svg>
                    </button>
                    <label class="block pt-2 text-end capitalize text-[#fff] fade-down delay-300" for="search">type css declaration</label>
                </form>
            </div>
        </div>
    </section>
</body>

</html>
